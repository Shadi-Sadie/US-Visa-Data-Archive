name: Monthly Visa Data Update

on:
  schedule:
    - cron: "0 5 1 * *"   # Monthly on day 1 at 05:00 UTC
  workflow_dispatch:       # Allows manual trigger from GitHub UI

permissions:
  contents: write

concurrency:
  group: visa-data-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python build_visa_dataset.py

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add data/processed/visa_data.csv
          git add data/processed/processed_files.json

          if ! git diff --cached --quiet; then
            git commit -m "Automated monthly visa data update"
            git push
          else
            echo "No data changes to commit."
          fi
